name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      # Run metrics check first (via pretest hook) — fails fast on accuracy regressions
      - run: npm run metrics:check
      - run: npm test
      # Note: strict mode (FP ≤ 3, accuracy ≥ 98%) is a future target.
      # Run locally with `npm run metrics:check -- --strict` to check progress.
